# Pinned native tool versions -- layer 2 of PrintLab's three-layer
# reproducibility model (see docs/environment.md). Python dependencies are
# pinned separately via uv.lock/requirements.txt (layer 1).
#
# `printlab doctor` compares installed versions against these pins. Every
# pipeline run also records the *actual* resolved version in
# run_manifest.json -- Tier-1 reproducibility requires those recorded
# versions to match across runs, not merely that `printlab doctor` is clean.

[tools.prusaslicer]
version = "2.9.6"
homepage = "https://github.com/prusa3d/PrusaSlicer"
role = "Reference backend for CI and determinism."

[tools.bambustudio]
version = "02.07.01.62"
homepage = "https://github.com/bambulab/BambuStudio"
role = "Primary backend for Bambu Lab printers."

[tools.orcaslicer]
version = "2.4.2"
homepage = "https://github.com/OrcaSlicer/OrcaSlicer"
role = "Alternative Bambu-compatible backend with a broader vendor profile library."

[tools.calculix]
version = "2.23"
homepage = "https://www.calculix.de/"
role = "FEA solver (ccx) for linear-static deflection/stress analysis (printlab fea)."

[tools.openscad]
version = "2021.01"
homepage = "https://openscad.org/"
role = "Parametric CAD compiler for the OpenSCAD source backend."

[tools.freecad]
version = "1.1.1"
homepage = "https://www.freecad.org/"
role = "Strict OpenSCAD CSG-to-B-rep STEP bridge."
